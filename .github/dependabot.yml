version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    rebase-strategy: auto
    ignore:
      - dependency-name: "*"
        versions:
          - "*-alpha*"
          - "*-beta*"
          - "*-rc*"

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    rebase-strategy: auto
    ignore:
      - dependency-name: "*"
        versions:
          - "*-alpha*"
          - "*-beta*"
          - "*-rc*"
